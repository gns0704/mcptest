<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>board/list.html</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .active{font-size: 1.5em;}
    </style>
</head>
<body>
<div class="container">
    <h1>게시글목록</h1>
    <table class="table">
        <tr>
            <th>글번호</th><th>작성자</th><th>제목</th><th>내용</th><th>작성일</th>
        </tr>
        <tr th:each="board:${list}">
            <td th:text="${board.num}"></td>
            <td th:text="${board.id}"></td>
            <td th:text="${board.title}"></td>
            <td th:text="${board.content}"></td>
            <td th:text="${board.regdate}"></td>
        </tr>
    </table>
    <div>
        <span  th:if="${startPage>5}">
          <a class="btn btn-secondary" th:href="@{/board/list(page=${startPage - 1})}" th:text="prev"></a>
        </span>
        <span th:each="num:${#numbers.sequence(startPage,endPage)}">
            <a class="btn btn-secondary" th:classappend="${page==num}?active"  th:href="@{/board/list(page=${num})}">[[${num}]]</a>
        </span>
        <span th:if="${endPage<pageCount }">
	       <a class="btn btn-secondary" th:href="@{/board/list(page=${endPage+1})}" th:text="next"></a>
	    </span>
    </div>
</div>
</body>
</html>
